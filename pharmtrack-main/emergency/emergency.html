<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PharmTrack Emergency Mode</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --red:        #ef5350;
    --red-dark:   #c62828;
    --red-glow:   rgba(239, 83, 80, 0.35);
    --blue:       #1565c0;
    --blue-light: #1e88e5;
    --amber:      #e65100;
    --amber-light:#f57c00;
    --mint:       #02c39a;
    --dark:       #0d0f14;
    --card:       #13161e;
    --border:     rgba(255,255,255,0.08);
    --text-dim:   rgba(255,255,255,0.45);
    --white:      #ffffff;
  }
 
  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--white);
    overflow: hidden;
  }
 
  /* ===== LAYOUT ===== */
  .page {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
 
  /* ===== HEADER BAR ===== */
  .header {
    background: var(--red);
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0 1.5rem;
    height: 60px;
    flex-shrink: 0;
    position: relative;
    box-shadow: 0 4px 24px var(--red-glow);
    animation: slideDown 0.4s ease;
  }
  @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: none; opacity: 1; } }
 
  .header-pulse {
    width: 10px; height: 10px;
    background: #fff;
    border-radius: 50%;
    flex-shrink: 0;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,0.5); }
    50%       { opacity: 0.7; transform: scale(1.2); box-shadow: 0 0 0 8px rgba(255,255,255,0); }
  }
 
  .header-icon { font-size: 1.4rem; }
  .header-title { font-weight: 700; font-size: 1rem; letter-spacing: 0.03em; flex: 1; }
 
  .close-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.4);
    background: transparent;
    color: #fff;
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .close-btn:hover { background: rgba(255,255,255,0.2); }
 
  /* ===== MAIN BODY ===== */
  .body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
    overflow: hidden;
  }
 
  /* animated radial glow */
  .body::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(239,83,80,0.08) 0%, transparent 70%);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation: breathe 3s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes breathe {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
    50%       { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
  }
 
  /* pin icon */
  .pin-wrap {
    position: relative;
    margin-bottom: 1.5rem;
    animation: fadeUp 0.5s 0.1s ease both;
  }
  .pin-icon {
    font-size: 4.5rem;
    display: block;
    filter: drop-shadow(0 0 20px rgba(239,83,80,0.6));
    animation: bobble 2.5s ease-in-out infinite;
  }
  @keyframes bobble {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-8px); }
  }
 
  .location-heading {
    font-size: 1.35rem;
    font-weight: 700;
    display: flex; align-items: center; gap: 0.5rem;
    animation: fadeUp 0.5s 0.2s ease both;
    text-align: center;
  }
  .location-heading .coords {
    color: rgba(255,255,255,0.7);
    font-weight: 500;
    font-size: 1.1rem;
  }
 
  .location-sub {
    color: var(--text-dim);
    font-size: 0.95rem;
    margin-top: 0.6rem;
    text-align: center;
    max-width: 420px;
    line-height: 1.6;
    animation: fadeUp 0.5s 0.3s ease both;
  }
 
  /* status line */
  .status-line {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: rgba(2,195,154,0.12);
    border: 1px solid rgba(2,195,154,0.3);
    border-radius: 100px;
    padding: 0.35rem 1rem;
    font-size: 0.8rem;
    color: var(--mint);
    font-weight: 600;
    margin-bottom: 1.8rem;
    animation: fadeUp 0.5s 0.15s ease both;
  }
  .status-line.locating { color: #ffd54f; border-color: rgba(255,213,79,0.3); background: rgba(255,213,79,0.08); }
  .status-line.error    { color: var(--red); border-color: rgba(239,83,80,0.3); background: rgba(239,83,80,0.08); }
 
  /* ===== MAP BUTTONS GRID ===== */
  .map-grid {
    display: flex; flex-wrap: wrap; gap: 0.75rem;
    justify-content: center;
    max-width: 620px;
    animation: fadeUp 0.5s 0.4s ease both;
  }
 
  .map-btn {
    display: flex; align-items: center; gap: 0.6rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.75rem 1.4rem;
    color: #6ea8fe;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .map-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.2s;
  }
  .map-btn:hover {
    border-color: rgba(110,168,254,0.5);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .map-btn:hover::before { background: rgba(110,168,254,0.06); }
  .map-btn:active { transform: translateY(0); }
  .map-btn .btn-icon { font-size: 1.1rem; }
 
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: none; }
  }
 
  /* ===== BOTTOM BAR ===== */
  .bottom-bar {
    display: flex;
    height: 72px;
    flex-shrink: 0;
    border-top: 1px solid rgba(255,255,255,0.06);
    animation: slideUp 0.5s 0.2s ease both;
  }
  @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: none; opacity: 1; } }
 
  .bottom-btn {
    flex: 1;
    display: flex; align-items: center; justify-content: center; gap: 0.6rem;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    transition: filter 0.2s, transform 0.1s;
    letter-spacing: 0.01em;
  }
  .bottom-btn:hover  { filter: brightness(1.12); }
  .bottom-btn:active { transform: scale(0.98); }
 
  .btn-ambulance { background: var(--red);        color: #fff; }
  .btn-police    { background: var(--blue-light);  color: #fff; }
  .btn-poison    { background: var(--amber-light); color: #fff; }
  .btn-maps      { background: #1e2030;            color: rgba(255,255,255,0.75); border-left: 1px solid var(--border); }
 
  .bottom-btn .b-icon { font-size: 1.1rem; }
 
  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.6rem 1.2rem;
    font-size: 0.85rem;
    color: var(--white);
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
 
  @media (max-width: 520px) {
    .header-title { font-size: 0.85rem; }
    .map-btn { font-size: 0.82rem; padding: 0.65rem 1rem; }
    .bottom-btn { font-size: 0.78rem; gap: 0.3rem; flex-direction: column; }
    .bottom-btn .b-icon { font-size: 1.3rem; }
  }
</style>
</head>
<body>
 
<div class="page" id="page">
 
  <!-- HEADER -->
  <div class="header">
    <div class="header-pulse"></div>
    <span class="header-icon">🚑</span>
    <span class="header-title">EMERGENCY MODE — Nearby Medical Help</span>
    <button class="close-btn" onclick="closePage()" title="Close">✕</button>
  </div>
 
  <!-- MAIN BODY -->
  <div class="body">
 
    <div class="pin-wrap">
      <span class="pin-icon">📍</span>
    </div>
 
    <!-- Status badge -->
    <div class="status-line locating" id="statusBadge">⏳ &nbsp;Detecting your location…</div>
 
    <div class="location-heading" id="locationHeading">
      <span id="locationText">Acquiring GPS…</span>
    </div>
 
    <p class="location-sub">
      Tap a button below to open Google Maps and find<br>
      nearby hospitals and pharmacies within 5 km.
    </p>
 
    <!-- Map quick-links -->
    <div class="map-grid" style="margin-top:1.8rem;">
      <button class="map-btn" onclick="openMaps('hospital')" id="btn-hospital">
        <span class="btn-icon">🏥</span> Hospitals (5km)
      </button>
      <button class="map-btn" onclick="openMaps('pharmacy')" id="btn-pharmacy">
        <span class="btn-icon">💊</span> Pharmacies (5km)
      </button>
      <button class="map-btn" onclick="openMaps('clinic')" id="btn-clinic">
        <span class="btn-icon">🏠</span> Clinics
      </button>
      <button class="map-btn" onclick="openMaps('24h medical store')" id="btn-24h">
        <span class="btn-icon">🏪</span> 24h Medical Stores
      </button>
    </div>
 
  </div><!-- /body -->
 
  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <a class="bottom-btn btn-ambulance" href="tel:108">
      <span class="b-icon">🚑</span> Ambulance (108)
    </a>
    <a class="bottom-btn btn-police" href="tel:100">
      <span class="b-icon">🛡️</span> Police (100)
    </a>
    <button class="bottom-btn btn-poison" onclick="openPoisonControl()">
      <span class="b-icon">☣️</span> Poison Control
    </button>
    <button class="bottom-btn btn-maps" onclick="openGoogleMapsGeneral()">
      <span class="b-icon">🗺️</span> Open Google Maps
    </button>
  </div>
 
</div><!-- /page -->
 
<!-- Toast notification -->
<div class="toast" id="toast"></div>
 
<script>
  /* ─── State ─── */
  let userLat = null, userLng = null;
  const FALLBACK_LAT = 12.8168, FALLBACK_LNG = 80.0398; // Chennai fallback
 
  /* ─── Geolocation ─── */
  function init() {
    if (!navigator.geolocation) {
      useCoords(FALLBACK_LAT, FALLBACK_LNG, true);
      return;
    }
    navigator.geolocation.getCurrentPosition(
      pos => useCoords(pos.coords.latitude, pos.coords.longitude, false),
      err => {
        console.warn('Geolocation error:', err.message);
        useCoords(FALLBACK_LAT, FALLBACK_LNG, true);
      },
      { timeout: 8000, enableHighAccuracy: true }
    );
  }
 
  function useCoords(lat, lng, isFallback) {
    userLat = lat; userLng = lng;
    const badge   = document.getElementById('statusBadge');
    const heading = document.getElementById('locationText');
 
    if (isFallback) {
      badge.className = 'status-line error';
      badge.textContent = '⚠️  Using approximate location';
    } else {
      badge.className = 'status-line';
      badge.innerHTML = '✅ &nbsp;Location confirmed';
    }
 
    async function useCoords(lat, lng, isFallback) {
  userLat = lat;
  userLng = lng;

  const badge = document.getElementById('statusBadge');
  const heading = document.getElementById('locationText');

  if (isFallback) {
    badge.className = 'status-line error';
    badge.textContent = '⚠️  Using approximate location';
  } else {
    badge.className = 'status-line';
    badge.innerHTML = '✅ &nbsp;Location confirmed';
  }

  try {
    // Reverse geocoding API
    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
    const data = await res.json();

    const place =
      data.address.city ||
      data.address.town ||
      data.address.village ||
      data.address.suburb ||
      "Unknown location";

    heading.textContent = `📍 Location found: ${place}`;
    
  } catch (err) {
    console.error("Reverse geocoding failed:", err);
    heading.textContent = `📌 Location found (${lat.toFixed(4)}, ${lng.toFixed(4)})`;
  }
}
  }
 
  /* ─── Maps helpers ─── */
  function mapsSearchURL(query) {
    const lat = userLat ?? FALLBACK_LAT;
    const lng = userLng ?? FALLBACK_LNG;
    // Google Maps nearby search anchored to the user's location
    return `https://www.google.com/maps/search/${encodeURIComponent(query)}/@${lat},${lng},14z`;
  }
 
  function openMaps(type) {
    const queries = {
      'hospital':           'hospitals near me',
      'pharmacy':           'pharmacies near me',
      'clinic':             'clinics near me',
      '24h medical store':  '24 hour medical stores open now near me'
    };
    const query = queries[type] || type;
    window.open(mapsSearchURL(query), '_blank', 'noopener');
    showToast('Opening Google Maps…');
  }
 
  function openGoogleMapsGeneral() {
    const lat = userLat ?? FALLBACK_LAT;
    const lng = userLng ?? FALLBACK_LNG;
    window.open(`https://maps.google.com/?q=${lat},${lng}`, '_blank', 'noopener');
  }
 
  function openPoisonControl() {
    // India poison control — AIIMS 24hr hotline
    showToast('Calling Poison Control: 1800-11-6117');
    setTimeout(() => { window.location.href = 'tel:18001116117'; }, 600);
  }
 
  /* ─── Close ─── */
  function closePage() {
    // Go back or fallback to index
    if (document.referrer) history.back();
    else window.location.href = '../index.html';
  }
 
  /* ─── Toast ─── */
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
  }
 
  /* ─── Boot ─── */
  init();
</script>
</body>
</html>
