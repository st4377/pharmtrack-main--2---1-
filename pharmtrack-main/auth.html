<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PharmaTrack — Login</title>
<link rel="stylesheet" href="css/base.css">
<style>
/* Email login styles */
.email-login-form {
  margin-top: 2.2rem;
  display: flex;
  flex-direction: column;
  gap: 1.1rem;
  z-index: 1;
}
.email-input {
  padding: 0.95rem 1.1rem;
  border-radius: 100px;
  border: 1.5px solid #1ec9a3;
  background: rgba(255,255,255,0.08);
  color: #fff;
  font-size: 1.05rem;
  font-family: 'Montserrat', 'DM Sans', sans-serif;
  outline: none;
  transition: border 0.18s, background 0.18s;
}
.email-input:focus {
  border: 2px solid #1ec9a3;
  background: rgba(30,201,163,0.08);
}
.email-login-btn {
  padding: 1rem;
  border-radius: 100px;
  background: linear-gradient(90deg, #1ec9a3 60%, #13bfa6 100%);
  color: #fff;
  border: none;
  font-weight: 700;
  font-size: 1.08rem;
  cursor: pointer;
  font-family: 'Montserrat', 'DM Sans', sans-serif;
  box-shadow: 0 2px 12px rgba(30,201,163,0.10);
  transition: box-shadow 0.18s, transform 0.12s, background 0.18s;
}
.email-login-btn:hover, .email-login-btn:focus {
  box-shadow: 0 4px 24px rgba(30,201,163,0.18);
  transform: translateY(-2px) scale(1.03);
  background: linear-gradient(90deg, #13bfa6 60%, #1ec9a3 100%);
}
.or-divider {
  margin: 2.2rem 0 0.5rem 0;
  display: flex;
  align-items: center;
  gap: 1rem;
  color: rgba(255,255,255,0.25);
  font-size: 0.92rem;
  font-family: 'Montserrat', 'DM Sans', sans-serif;
  letter-spacing: 0.04em;
}
.or-divider::before, .or-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(255,255,255,0.10);
}
body {
  min-height: 100vh;
  margin: 0;
  padding: 0;
  background: linear-gradient(135deg, #1ec9a3 0%, #131c27 100%);
  font-family: 'Montserrat', 'DM Sans', Arial, sans-serif;
}
.auth-container {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: transparent;
}
.auth-card {
  background: rgba(24,36,52,0.92);
  padding: 3.2rem 2.5rem 2.5rem 2.5rem;
  border-radius: 32px;
  width: 400px;
  border: 1.5px solid rgba(30,201,163,0.18);
  text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25), 0 1.5px 0 #1ec9a3;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(8px);
  transition: box-shadow 0.2s;
}
.auth-card::before {
  content: '';
  position: absolute;
  top: -60px; left: -60px;
  width: 180px; height: 180px;
  background: radial-gradient(circle, #1ec9a3 0%, transparent 70%);
  opacity: 0.18;
  z-index: 0;
}
.auth-card h2 {
  font-family: 'Montserrat', 'DM Serif Display', serif;
  font-size: 2.3rem;
  font-weight: 700;
  color: #fff;
  margin-bottom: 0.7rem;
  letter-spacing: 0.5px;
  z-index: 1;
}
.auth-card p {
  color: #b0bac9;
  font-size: 1.08rem;
  margin-bottom: 2.2rem;
  z-index: 1;
}
.btn-google {
  width: 100%;
  padding: 1.1rem;
  border-radius: 100px;
  background: #fff;
  color: #222;
  border: none;
  font-weight: 700;
  font-size: 1.08rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.85rem;
  text-decoration: none;
  transition: box-shadow 0.18s, transform 0.12s;
  font-family: 'Montserrat', 'DM Sans', sans-serif;
  box-shadow: 0 2px 12px rgba(30,201,163,0.10);
  z-index: 1;
}
.btn-google:hover, .btn-google:focus {
  box-shadow: 0 4px 24px rgba(30,201,163,0.18);
  transform: translateY(-2px) scale(1.03);
}
.btn-google svg {
  width: 24px;
  height: 24px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 1px 4px rgba(30,201,163,0.10);
}
.divider {
  margin: 1.5rem 0;
  display: flex;
  align-items: center;
  gap: 1rem;
  color: rgba(255,255,255,0.2);
  font-size: 0.8rem;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(255,255,255,0.1);
}
.brand-logo {
  font-family: 'Montserrat', 'DM Serif Display', serif;
  font-size: 2.1rem;
  font-weight: 700;
  color: #fff;
  margin-bottom: 1.5rem;
  display: block;
  text-decoration: none;
  letter-spacing: 0.5px;
  z-index: 1;
}
.brand-logo span { color: #1ec9a3; }
@media (max-width: 500px) {
  .auth-card {
    padding: 2rem 0.5rem 1.5rem 0.5rem;
    width: 98vw;
    min-width: unset;
  }
  .auth-card h2 {
    font-size: 1.5rem;
  }
  .brand-logo {
    font-size: 1.3rem;
  }
}
</style>
</head>
<body>

<div class="auth-container">
  <div class="auth-card">
    <a href="index.html" class="brand-logo">Pharm<span>Track</span></a>
    <h2>Welcome Back</h2>
    <p>Sign in to access your medicine dashboard, reminders, and emergency features.</p>

    <a href="/auth/google" class="btn-google">
      <!-- Google SVG logo -->
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Continue with Google
    </a>

    <div class="or-divider">or</div>
    <form class="email-login-form" autocomplete="on" method="POST" action="/auth/email">
      <input class="email-input" type="email" name="email" placeholder="Email address" required autocomplete="email">
      <input class="email-input" type="password" name="password" placeholder="Password" required autocomplete="current-password">
      <button class="email-login-btn" type="submit">Continue with Email</button>
    </form>
  </div>
</div>

</body>
</html>
